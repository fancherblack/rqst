[rqst_kv_audit]
collection = rqst_audit
external_type = kvstore
fields_list = timestamp, data_id, user, action_type, action_detail

[rqst_kv_team]
collection = rqst_team
external_type = kvstore
fields_list = admin_user, admin_title, admin_realname, admin_phone, admin_email, admin_approver

[rqst_kv_journal]
collection = rqst_journal
external_type = kvstore
fields_list = data_id, timestamp, admin_user, entry

[rqst_kv_groups]
collection = rqst_groups
external_type = kvstore
fields_list = splunk_role, group_alias

[rqst_kv_users]
collection = rqst_users
external_type = kvstore
fields_list = splunk_username, splunk_email, splunk_roles, splunk_realname

[rqst_kv_data]
collection = rqst_data
external_type = kvstore
fields_list = _key, custom_field, admin_index, admin_sourcetype, admin_user, use_case, data_tags, data_description, data_group_access, data_hostnames, data_sample, data_transport, data_volume, due_date, notes, priority, data_id, requestor_email, requestor_realname, requestor_user, status, timestamp, origin

[rqst_kv_options]
collection = rqst_options
external_type = kvstore
fields_list = approval_process, cost_per_indexer, cost_per_license_gb, cost_per_tb_storage, use_case, data_transport, email_new_request_admin, email_new_request_approver, email_new_request_user, email_notifications, email_server, email_updated_request_user, help_url, indexer_daily_ingest_target, planned_indexer_deployment_count, priority, replication_factor, search_factor, status, show_custom_field, custom_field_label, custom_field_values, custom_field_description
